<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snooker Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:transparent!important;overflow:hidden;font-family:'Prompt',sans-serif;color:#fff;height:100vh;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding-bottom:18px}

        .overlay-wrap{display:flex;flex-direction:column;align-items:center;width:94%;max-width:1000px}

        /* ===== MATCH BANNER ===== */
        .match-banner{display:flex;align-items:center;justify-content:center;gap:12px;width:65%;padding:7px 28px;border-radius:30px 30px 0 0;background:linear-gradient(180deg,#2a2000 0%,#1a1400 100%);border:2px solid;border-bottom:none;border-image:linear-gradient(90deg,transparent,#d4a520,#f5d77a,#d4a520,transparent) 1;position:relative;z-index:2;box-shadow:0 -4px 20px rgba(212,165,32,.3)}
        .match-banner .b-logo{width:30px;height:30px;border-radius:50%;object-fit:contain;background:#fff;flex-shrink:0;box-shadow:0 0 8px rgba(212,165,32,.5)}
        .match-banner .b-text{font-size:14px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;background:linear-gradient(90deg,#f5d77a,#fff6d5,#d4a520);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;text-shadow:none;filter:drop-shadow(0 0 6px rgba(245,215,122,.4))}

        /* ===== MAIN SCOREBOARD ===== */
        .scoreboard{display:flex;align-items:stretch;width:100%;min-height:76px;border-radius:16px;overflow:visible;position:relative;background:linear-gradient(180deg,#1c1c1c 0%,#0a0a0a 100%);border:2px solid #b8860b;box-shadow:0 0 25px rgba(184,134,11,.35),0 0 60px rgba(184,134,11,.12),inset 0 1px 0 rgba(255,255,255,.06)}

        /* Player sections */
        .p-sec{display:flex;align-items:center;flex:1;padding:8px 20px;gap:12px;transition:all .3s;position:relative}
        .p1-sec{justify-content:flex-start;border-radius:14px 0 0 14px}
        .p2-sec{justify-content:flex-end;border-radius:0 14px 14px 0}
        .p-info{display:flex;flex-direction:column;min-width:0;flex:1}
        .p1-sec .p-info{text-align:left}
        .p2-sec .p-info{text-align:right;align-items:flex-end}
        .p-info .pn{font-size:22px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.9)}
        .p-info .hc{font-size:14px;color:#f5d77a;font-weight:700;line-height:1.1;text-shadow:0 0 8px rgba(245,215,122,.4)}

        /* Score boxes */
        .sc{display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;min-width:80px;padding:4px 16px;background:linear-gradient(180deg,#222 0%,#111 100%);text-shadow:0 3px 10px rgba(0,0,0,.9);transition:all .4s;flex-shrink:0;border:1px solid rgba(184,134,11,.3)}
        .p1-sec .sc{border-radius:0 12px 12px 0;order:2}
        .p2-sec .sc{border-radius:12px 0 0 12px}

        /* Active states */
        .active-p1 .p1-sec{background:linear-gradient(90deg,rgba(37,99,235,.18),transparent)}
        .active-p1 .p1-sec .sc{background:linear-gradient(180deg,#2563eb,#1d4ed8);box-shadow:0 0 25px rgba(37,99,235,.5),0 0 50px rgba(37,99,235,.2);border-color:#3b82f6}
        .active-p2 .p2-sec{background:linear-gradient(270deg,rgba(220,38,38,.18),transparent)}
        .active-p2 .p2-sec .sc{background:linear-gradient(180deg,#dc2626,#991b1b);box-shadow:0 0 25px rgba(220,38,38,.5),0 0 50px rgba(220,38,38,.2);border-color:#ef4444}

        /* Center */
        .c-sec{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 16px;background:linear-gradient(180deg,#111 0%,#000 100%);min-width:145px;flex-shrink:0;position:relative;border-left:1px solid rgba(184,134,11,.25);border-right:1px solid rgba(184,134,11,.25)}
        .fn{font-size:30px;font-weight:900;min-width:32px;text-align:center;text-shadow:0 0 10px rgba(255,255,255,.2)}
        .c-mid{display:flex;flex-direction:column;align-items:center;gap:2px}
        .c-mid .c-time{font-size:12px;color:#94a3b8;font-weight:600}
        .c-mid .c-balls{font-size:13px;color:#10b981;font-weight:700;text-shadow:0 0 6px rgba(16,185,129,.4)}
        
        /* Arrows */
        .arr{width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;flex-shrink:0;filter:drop-shadow(0 0 4px rgba(34,197,94,.6));animation:arrowLive 1s ease-in-out infinite}
        .arr-l{border-right:13px solid #22c55e;display:none}
        .arr-r{border-left:13px solid #22c55e;display:none}
        .active-p1 .arr-l{display:block}
        .active-p2 .arr-r{display:block}
        @keyframes arrowLive{50%{transform:scale(1.25);filter:drop-shadow(0 0 10px rgba(34,197,94,1))}}

        .p-sec::after{content:'กำลังแทง';position:absolute;top:-18px;padding:3px 11px;border-radius:10px 10px 0 0;background:linear-gradient(180deg,#22c55e,#15803d);font-size:10px;font-weight:700;letter-spacing:.5px;opacity:0;transform:translateY(5px);transition:.25s;box-shadow:0 -3px 12px rgba(34,197,94,.35)}
        .p1-sec::after{left:22px}.p2-sec::after{right:22px}
        .active-p1 .p1-sec::after,.active-p2 .p2-sec::after{opacity:1;transform:translateY(0)}

        /* Break display */
        .brk{position:absolute;top:-34px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#2a2000,#1a1400);padding:4px 20px;border-radius:14px;font-size:14px;font-weight:700;color:#f5d77a;white-space:nowrap;display:none;border:1px solid #b8860b;box-shadow:0 0 15px rgba(184,134,11,.4)}
        .brk.show{display:block;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:.85;transform:translateX(-50%) scale(.97)}50%{opacity:1;transform:translateX(-50%) scale(1.03)}}

        /* ===== ROUND BAR ===== */
        .round-bar{display:flex;align-items:center;justify-content:center;width:35%;padding:5px 30px;border-radius:0 0 16px 16px;background:linear-gradient(180deg,#b91c1c,#991b1b);position:relative;z-index:2;border:1px solid;border-top:none;border-image:linear-gradient(90deg,transparent,#ef4444,transparent) 1;box-shadow:0 4px 15px rgba(185,28,28,.4)}
        .round-bar span{font-size:15px;font-weight:700;letter-spacing:1.5px;text-shadow:0 2px 4px rgba(0,0,0,.7)}

        /* ===== LOGO ===== */
        .top-right-logo{position:absolute;top:30px;right:30px;width:160px;height:160px;background:#fff;border-radius:50%;display:flex;justify-content:center;align-items:center;border:4px solid #d4a520;box-shadow:0 0 25px rgba(212,165,32,.4),0 8px 30px rgba(0,0,0,.6);z-index:100;overflow:hidden}
        .top-right-logo img{width:100%;height:100%;object-fit:contain}

        .score-changed{animation:flash .4s ease-out}
        @keyframes flash{0%{filter:brightness(2.5)}100%{filter:brightness(1)}}

        /* ===== THEMES ===== */
        body.theme-glass .scoreboard{background:rgba(0,0,0,.35);backdrop-filter:blur(18px);border-color:rgba(212,165,32,.4);box-shadow:0 0 30px rgba(212,165,32,.2)}
        body.theme-glass .match-banner{background:rgba(0,0,0,.3);backdrop-filter:blur(12px)}
        body.theme-green .scoreboard{background:linear-gradient(180deg,rgba(6,78,59,.94),rgba(2,44,34,.97));border-color:#16a34a;box-shadow:0 0 25px rgba(22,163,74,.3)}
        body.theme-green .match-banner{background:linear-gradient(90deg,rgba(2,44,34,.95),rgba(6,78,59,.95),rgba(2,44,34,.95))}
        body.theme-green .active-p1 .p1-sec .sc{background:linear-gradient(180deg,#16a34a,#15803d);box-shadow:0 0 25px rgba(22,163,74,.5);border-color:#22c55e}
        body.theme-green .active-p2 .p2-sec .sc{background:linear-gradient(180deg,#16a34a,#15803d);box-shadow:0 0 25px rgba(22,163,74,.5);border-color:#22c55e}
        body.theme-black .scoreboard{background:rgba(0,0,0,.98);border-color:#b8860b;box-shadow:0 0 20px rgba(184,134,11,.25)}
        body.theme-black .match-banner{background:#000}
        body.theme-neon .scoreboard{background:rgba(18,4,34,.95);border-color:#c026d3;box-shadow:0 0 30px rgba(192,38,211,.35)}
        body.theme-neon .match-banner{background:linear-gradient(90deg,#120422,#2e1065,#120422);border-image:linear-gradient(90deg,transparent,#c026d3,#e879f9,#c026d3,transparent) 1}
        body.theme-neon .match-banner .b-text{background:linear-gradient(90deg,#22d3ee,#e879f9,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        body.theme-neon .active-p1 .p1-sec .sc{background:linear-gradient(180deg,#a855f7,#7e22ce);box-shadow:0 0 25px rgba(168,85,247,.5);border-color:#c084fc}
        body.theme-neon .active-p2 .p2-sec .sc{background:linear-gradient(180deg,#ec4899,#be185d);box-shadow:0 0 25px rgba(236,72,153,.5);border-color:#f472b6}
        body.theme-neon .round-bar{background:linear-gradient(180deg,#7e22ce,#6b21a8);box-shadow:0 4px 15px rgba(126,34,206,.4)}

        /* ===== SUMMARY ===== */
        #summary-screen{position:fixed;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(135deg,#1e1b4b,#312e81,#1e1b4b);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .5s;pointer-events:none}
        #summary-screen.show{opacity:1;pointer-events:auto}
        .summary-bg-pattern{position:absolute;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:40px 40px;z-index:-1;opacity:.5}
        .summary-header{text-align:center;margin-bottom:20px;display:flex;flex-direction:column;align-items:center;z-index:2}
        .summary-logo{width:120px;height:120px;background:#fff;border-radius:50%;border:4px solid #fbbf24;margin-bottom:15px;box-shadow:0 0 20px rgba(0,0,0,.5);display:flex;justify-content:center;align-items:center;overflow:hidden}
        .summary-logo img{width:100%;height:100%;object-fit:contain}
        .summary-match-name{font-size:38px;font-weight:900;color:#fbbf24;text-shadow:0 4px 6px rgba(0,0,0,.8);letter-spacing:2px}
        .summary-round{font-size:26px;font-weight:700;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.8);margin-top:5px}
        .summary-content{display:flex;align-items:flex-start;justify-content:center;gap:30px;width:95%;max-width:1300px;background:rgba(0,0,0,.4);border-radius:20px;padding:40px;box-shadow:0 10px 30px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);z-index:2}
        .summary-player{flex:1;display:flex;flex-direction:column;align-items:center}
        .summary-photo-container{position:relative;width:180px;height:180px;background:#fbbf24;border-radius:50%;display:flex;justify-content:center;align-items:center;overflow:hidden;border:5px solid #fff;box-shadow:0 10px 20px rgba(0,0,0,.5);margin-bottom:20px}
        .summary-photo-container.doubles{width:260px;border-radius:90px}
        .summary-photo-container img{width:100%;height:100%;object-fit:cover}
        .summary-photo-container.doubles img{width:50%;height:100%}
        .summary-player-name{width:100%;background:#fff;color:#000;font-size:30px;font-weight:900;text-align:center;padding:12px 0;border-radius:8px;box-shadow:0 5px 15px rgba(0,0,0,.3);margin-bottom:25px}
        .summary-center{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-width:160px;padding-top:55px}
        .summary-overall-score{font-size:72px;font-weight:900;color:#fff;text-shadow:0 4px 10px rgba(0,0,0,.8);margin-bottom:40px;letter-spacing:5px}
        .summary-frames{width:100%;display:flex;flex-direction:column;gap:12px}
        .sf-score{background:rgba(30,41,59,.8);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;border-radius:8px;box-shadow:inset 0 2px 10px rgba(0,0,0,.5)}
        .sf-score.winner{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.5);color:#10b981}
        .sf-label{background:rgba(255,255,255,.1);color:#fff;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid rgba(255,255,255,.05)}
    </style>
</head>
<body>
    <div class="top-right-logo" id="main-logo">
        <img src="logo.png" alt="Logo" onerror="document.getElementById('main-logo').style.display='none'">
    </div>

    <!-- SUMMARY SCREEN -->
    <div id="summary-screen">
        <div class="summary-bg-pattern"></div>
        <div class="summary-header">
            <div class="summary-logo"><img src="logo.png" alt="" crossorigin="anonymous" onerror="this.style.display='none'"></div>
            <div class="summary-match-name" id="sum-match-name">การแข่งขัน</div>
            <div class="summary-round" id="sum-round">-</div>
        </div>
        <div class="summary-content">
            <div class="summary-player">
                <div class="summary-photo-container" id="sum-p1-photo-box">
                    <img src="p1.png" id="sum-p1-img" crossorigin="anonymous" onerror="this.src='https://ui-avatars.com/api/?name=P1&background=random'">
                    <img src="p3.png" id="sum-p3-img" crossorigin="anonymous" style="display:none" onerror="this.src='https://ui-avatars.com/api/?name=P3&background=random'">
                </div>
                <div class="summary-player-name" id="sum-p1-name">ผู้เล่น 1</div>
                <div class="summary-frames" id="sum-p1-frames"></div>
            </div>
            <div class="summary-center">
                <div class="summary-overall-score" id="sum-overall-score">0 - 0</div>
                <div class="summary-frames" id="sum-center-labels"></div>
            </div>
            <div class="summary-player">
                <div class="summary-photo-container" id="sum-p2-photo-box">
                    <img src="p2.png" id="sum-p2-img" crossorigin="anonymous" onerror="this.src='https://ui-avatars.com/api/?name=P2&background=random'">
                    <img src="p4.png" id="sum-p4-img" crossorigin="anonymous" style="display:none" onerror="this.src='https://ui-avatars.com/api/?name=P4&background=random'">
                </div>
                <div class="summary-player-name" id="sum-p2-name">ผู้เล่น 2</div>
                <div class="summary-frames" id="sum-p2-frames"></div>
            </div>
        </div>
    </div>

    <!-- MAIN OVERLAY -->
    <div class="overlay-wrap" id="overlay-main">
        <div class="match-banner">
            <img class="b-logo" src="logo.png" alt="" onerror="this.style.display='none'">
            <span class="b-text" id="match-name-banner">STC SNOOKER SCORE</span>
        </div>
        <div class="scoreboard">
            <div class="p-sec p1-sec">
                <div class="p-info">
                    <span class="pn" id="p1-name">ผู้เล่น 1</span>
                    <span class="hc" id="p1-handicap"></span>
                </div>
                <div class="sc" id="p1-score">0</div>
            </div>
            <div class="c-sec">
                <span class="fn" id="p1-frame">0</span>
                <div class="arr arr-l"></div>
                <div class="c-mid">
                    <span class="c-time" id="c-time">0:00</span>
                    <span class="c-balls" id="c-balls">(15)</span>
                </div>
                <div class="arr arr-r"></div>
                <span class="fn" id="p2-frame">0</span>
                <div class="brk" id="brk">เบรก: 0</div>
            </div>
            <div class="p-sec p2-sec">
                <div class="sc" id="p2-score">0</div>
                <div class="p-info">
                    <span class="pn" id="p2-name">ผู้เล่น 2</span>
                    <span class="hc" id="p2-handicap"></span>
                </div>
            </div>
        </div>
        <div class="round-bar">
            <span id="round-label">แข่งใครถึง 3</span>
        </div>
    </div>

    <script>
        const socket = io();
        const overlay = document.getElementById('overlay-main');
        let lastP1=0, lastP2=0;
        let timerRunning=false,timerElapsed=0,timerStartedAt=null;
        let lastSummaryKey='';
        function setImageIfChanged(element, src) {
            if (element.getAttribute('src') !== src) element.setAttribute('src', src);
        }

        socket.on('updateState', (s) => {
            timerRunning=Boolean(s.timer&&s.timer.isRunning);
            timerElapsed=Number(s.timer&&s.timer.elapsedSeconds)||0;
            timerStartedAt=s.timer&&s.timer.startedAt;
            const p1E=document.getElementById('p1-score'), p2E=document.getElementById('p2-score');
            if(s.player1.score!==lastP1){p1E.classList.remove('score-changed');void p1E.offsetWidth;p1E.classList.add('score-changed')}
            if(s.player2.score!==lastP2){p2E.classList.remove('score-changed');void p2E.offsetWidth;p2E.classList.add('score-changed')}
            lastP1=s.player1.score; lastP2=s.player2.score;

            document.getElementById('p1-name').innerText=s.player1.name;
            p1E.innerText=s.player1.score;
            document.getElementById('p1-frame').innerText=s.player1.frame;
            document.getElementById('p2-name').innerText=s.player2.name;
            p2E.innerText=s.player2.score;
            document.getElementById('p2-frame').innerText=s.player2.frame;

            // Handicap
            const h=s.handicap||{p1:0,p2:0};
            document.getElementById('p1-handicap').innerText=h.p1?`(+${h.p1})`:'';
            document.getElementById('p2-handicap').innerText=h.p2?`(+${h.p2})`:'';

            // Match info
            if(s.matchInfo){
                document.getElementById('match-name-banner').innerText=s.matchInfo.name||'STC SNOOKER SCORE';
                document.getElementById('round-label').innerText=s.matchInfo.round||`แข่งใครถึง ${s.matchFormat}`;
            } else {
                document.getElementById('round-label').innerText=`แข่งใครถึง ${s.matchFormat}`;
            }

            document.getElementById('c-balls').innerText=`(${s.redsLeft})`;

            // Break
            const bk=document.getElementById('brk');
            if(s.currentBreak>0){bk.innerText=`เบรก: ${s.currentBreak}`;bk.classList.add('show')}else{bk.classList.remove('show')}

            // Theme
            document.body.className=s.theme||'theme-default';

            // Active
            overlay.classList.remove('active-p1','active-p2');
            overlay.classList.add(s.activePlayer===1?'active-p1':'active-p2');

            // Summary
            if(s.summary){
                const ss=document.getElementById('summary-screen');
                s.summary.show?ss.classList.add('show'):ss.classList.remove('show');
                document.getElementById('sum-match-name').innerText=s.summary.matchName||'';
                document.getElementById('sum-round').innerText=s.summary.round||'-';
                document.getElementById('sum-overall-score').innerText=`${s.player1.frame} - ${s.player2.frame}`;
                document.getElementById('sum-p1-name').innerText=s.player1.name;
                document.getElementById('sum-p2-name').innerText=s.player2.name;
                setImageIfChanged(document.getElementById('sum-p1-img'),s.summary.p1Photo||'https://ui-avatars.com/api/?name=P1&background=random');
                setImageIfChanged(document.getElementById('sum-p2-img'),s.summary.p2Photo||'https://ui-avatars.com/api/?name=P2&background=random');
                const p1B=document.getElementById('sum-p1-photo-box'),p2B=document.getElementById('sum-p2-photo-box');
                if(s.summary.isDoubles){p1B.classList.add('doubles');p2B.classList.add('doubles');document.getElementById('sum-p3-img').style.display='block';setImageIfChanged(document.getElementById('sum-p3-img'),s.summary.p3Photo||'');document.getElementById('sum-p4-img').style.display='block';setImageIfChanged(document.getElementById('sum-p4-img'),s.summary.p4Photo||'')}
                else{p1B.classList.remove('doubles');p2B.classList.remove('doubles');document.getElementById('sum-p3-img').style.display='none';document.getElementById('sum-p4-img').style.display='none'}
                const summaryKey=JSON.stringify({frames:s.frames,p1:s.player1.score,p2:s.player2.score});
                if(summaryKey===lastSummaryKey)return;
                lastSummaryKey=summaryKey;
                const f1=document.getElementById('sum-p1-frames'),f2=document.getElementById('sum-p2-frames'),fl=document.getElementById('sum-center-labels');
                f1.innerHTML='';f2.innerHTML='';fl.innerHTML='';
                const rows=Math.max((s.frames||[]).length+1,3);
                for(let i=0;i<rows;i++){
                    const fd=(s.frames||[])[i];let s1='-',s2='-',w=null;
                    if(fd){s1=fd.p1Score;s2=fd.p2Score;w=fd.winner}else if(i===(s.frames||[]).length){s1=s.player1.score;s2=s.player2.score}
                    const d1=document.createElement('div');d1.className=`sf-score ${w===1?'winner':''}`;d1.innerText=s1;f1.appendChild(d1);
                    const dl=document.createElement('div');dl.className='sf-label';dl.innerText=`เฟรม ${i+1}`;
                    if(i===(s.frames||[]).length){dl.style.border='1px solid #fbbf24';dl.style.background='rgba(251,191,36,0.2)';dl.style.color='#fbbf24'}
                    fl.appendChild(dl);
                    const d2=document.createElement('div');d2.className=`sf-score ${w===2?'winner':''}`;d2.innerText=s2;f2.appendChild(d2);
                }
            }
        });

        function updateOverlayTimer(){
            let seconds=timerElapsed;
            if(timerRunning&&timerStartedAt)seconds+=Math.max(0,Math.floor((Date.now()-timerStartedAt)/1000));
            const hours=Math.floor(seconds/3600);
            const minutes=Math.floor((seconds%3600)/60);
            const secs=seconds%60;
            document.getElementById('c-time').innerText=hours>0?`${hours}:${String(minutes).padStart(2,'0')}:${String(secs).padStart(2,'0')}`:`${minutes}:${String(secs).padStart(2,'0')}`;
        }
        setInterval(updateOverlayTimer,1000);

        socket.on('TAKE_SCREENSHOT', async()=>{
            const el=document.getElementById('summary-screen');
            if(!el.classList.contains('show'))return;
            try{await new Promise(r=>setTimeout(r,300));const c=await html2canvas(el,{backgroundColor:'#0f172a',scale:2,useCORS:true,logging:false});socket.emit('SCREENSHOT_DATA',c.toDataURL('image/png'))}catch(e){console.error(e)}
        });
    </script>
</body>
</html>
